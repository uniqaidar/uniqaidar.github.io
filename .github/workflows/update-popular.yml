# .github/workflows/update-popular.yml
# Runs every 6 hours at 00:30, 06:30, 12:30, 18:30 UTC.
# Fetches ALL historical archive files + today's live KV stats simultaneously,
# computes the all-time top-25 most-downloaded fonts, updates popular.json
# when the ordered list changes (order OR membership).

name: Auto-Update popular.json

on:
  schedule:
    - cron: '30 0,6,12,18 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-popular:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch live stats
        env:
          STATS_URL: https://uniqaidar.pages.dev/api/stats
          ARCHIVE_TOKEN: ${{ secrets.ARCHIVE_TOKEN }}
        run: |
          set -e
          echo "Fetching live stats..."
          LIVE=$(curl -sf \
            -H "Authorization: Bearer ${ARCHIVE_TOKEN}" \
            "${STATS_URL}?type=dl" \
            --max-time 60) || LIVE='{"ok":true,"downloads":[]}'
          OK=$(echo "$LIVE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ok','false'))" 2>/dev/null || echo "false")
          if [ "$OK" != "True" ] && [ "$OK" != "true" ]; then
            LIVE='{"ok":true,"downloads":[]}'
          fi
          echo "$LIVE" > live_stats.json
          echo "Live stats saved."

      - name: Write compute script
        run: |
          cat > compute_popular.py << 'PYEOF'
          import json, os, glob

          with open('live_stats.json') as f:
              live_data = json.load(f)
          live_events = live_data.get('downloads', [])
          print(f"Live events today: {len(live_events)}")

          arch_dir = 'historicaldata'
          hist_events = []
          if os.path.isdir(arch_dir):
              arch_files = sorted(glob.glob(os.path.join(arch_dir, 'archive_*.json')))
              print(f"Archive files: {len(arch_files)}")
              for path in arch_files:
                  try:
                      with open(path, encoding='utf-8') as f:
                          entries = json.load(f)
                      for entry in entries:
                          hist_events.extend(entry.get('downloads', []))
                  except Exception as e:
                      print(f"Warning: {path}: {e}")
              print(f"Historical events: {len(hist_events)}")

          all_events = hist_events + live_events
          print(f"Total events: {len(all_events)}")

          count_map = {}
          for ev in all_events:
              if ev.get('type') != 'single':
                  continue
              ev_event = (ev.get('event') or '').strip()
              if ev_event not in ('', 'download'):
                  continue
              font = (ev.get('font') or '').strip()
              if not font:
                  continue
              if 'داگرتنی کاتێگۆری' in font:
                  continue
              if 'داگرتنی تەواوی' in font:
                  continue
              count_map[font] = count_map.get(font, 0) + 1

          top25 = [name for name, _ in sorted(count_map.items(), key=lambda x: -x[1])[:25]]
          print(f"Top-25 ({len(top25)}): {top25[:5]}...")

          popular_path = 'popular.json'
          current = []
          if os.path.exists(popular_path):
              try:
                  with open(popular_path, encoding='utf-8') as f:
                      current = json.load(f)
              except Exception:
                  current = []

          if top25 == current:
              print("No change. Skipping.")
              with open('no_change.flag', 'w') as f:
                  f.write('1')
          else:
              entered = set(top25) - set(current)
              left = set(current) - set(top25)
              print(f"Changed! In: {entered} | Out: {left} | Top5: {top25[:5]}")
              with open('popular.json', 'w', encoding='utf-8') as f:
                  json.dump(top25, f, indent=2, ensure_ascii=False)
              print(f"Written {len(top25)} fonts.")
          PYEOF

      - name: Compute top-25 and update popular.json
        run: python3 compute_popular.py

      - name: Commit updated popular.json
        run: |
          if [ -f no_change.flag ]; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git config user.name  "UniQaidar Bot"
          git config user.email "bot@uniqaidar.pages.dev"
          git add popular.json
          if git diff --staged --quiet; then
            echo "Git sees no diff."
          else
            git reset HEAD popular.json
            git pull --rebase
            git add popular.json
            git commit -m "Auto-update popular.json: top 25 trending fonts [$(TZ='Asia/Baghdad' date '+%Y-%m-%d %H:%M')]"
            git push
            echo "Committed and pushed."
          fi