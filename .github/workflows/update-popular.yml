# .github/workflows/update-popular.yml
# ╔════════════  ══════════════════════════════════════════════════════════════╗
# ║  UniQaidar Font Analytics Engine v3.0 [ENTERPRISE GRADE]                 ║
# ║  Sulaymaniyah Iraq Time (GMT+3) • All timestamps Asia/Baghdad             ║
# ║  Runs: 03:30, 09:30, 15:30, 21:30 Sulaymaniyah (00:30, 06:30, 12:30,    ║
# ║        18:30 UTC)                                                         ║
# ║                                                                           ║
# ║  CAPABILITIES:                                                            ║
# ║  ✓ Enterprise-grade error handling & recovery                            ║
# ║  ✓ Real-time metrics & performance analytics                             ║
# ║  ✓ Intelligent change detection with history tracking                    ║
# ║  ✓ Concurrent data processing with parallel jobs                         ║
# ║  ✓ Advanced retry strategies with exponential backoff                    ║
# ║  ✓ Webhook notifications & alerts                                        ║
# ║  ✓ Database-style transaction logging                                    ║
# ║  ✓ Full UTF-8 Kurdish text support                                       ║
# ║  ✓ Future-proof through 2046+ (20+ years)                                ║
# ║  ✓ Memory-optimized for large datasets                                   ║
# ║  ✓ Automatic health checks & diagnostics                                 ║
# ║  ✓ Audit trail with change history                                       ║
# ║  ✓ Rate limit handling & graceful degradation                            ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

name: '[🤖] UniQaidar Font Analytics Engine v3'

on:
  schedule:
    # SULAYMANIYAH TIME: 03:30, 09:30, 15:30, 21:30 (every 6 hours)
    # UTC EQUIVALENT: 00:30, 06:30, 12:30, 18:30
    - cron: '30 0,6,12,18 * * *'
  
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: '🔄 Force regenerate even without changes'
        required: false
        default: 'false'
      enable_debug:
        description: '🐛 Enable debug mode with verbose logging'
        required: false
        default: 'false'
      skip_notification:
        description: '🔕 Skip webhook notifications'
        required: false
        default: 'false'
      archive_backup:
        description: '💾 Create backup before update'
        required: false
        default: 'true'
  
  # Manual trigger as fallback
  workflow_call:

concurrency:
  group: popular-fonts-update
  cancel-in-progress: false

env:
  # TIMEZONE & LOCALIZATION
  TZ: Asia/Baghdad
  TIMEZONE_NAME: 'Sulaymaniyah/Iraq (GMT+3)'
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8
  PYTHONIOENCODING: utf-8
  
  # COLORS & OUTPUT
  FORCE_COLOR: '1'
  CI: 'true'
  
  # APPLICATION CONSTANTS
  APP_NAME: 'UniQaidar Font Analytics'
  APP_VERSION: '3.0.0'
  MAX_FONTS_TRACKED: '25'
  MIN_VALID_EVENTS: '50'
  DATA_RETENTION_DAYS: '730'
  ARCHIVE_CHUNK_SIZE: '500'
  
  # PATHS & FILES
  ARCHIVE_DIR: historicaldata
  POPULAR_JSON: popular.json
  ANALYTICS_LOG: .github/logs/analytics.log
  TRANSACTION_LOG: .github/logs/transactions.log
  METRICS_FILE: .github/metrics/latest.json
  HISTORY_DIR: .github/history
  
  # TIMEOUTS & RETRIES
  API_TIMEOUT_SEC: '120'
  CONNECT_TIMEOUT_SEC: '15'
  RETRY_ATTEMPTS: '5'
  RETRY_BACKOFF_BASE: '2'
  RETRY_DELAY_SEC: '8'
  MAX_PARALLEL_JOBS: '4'
  
  # FEATURE FLAGS
  ENABLE_WEBHOOKS: 'true'
  ENABLE_ANALYTICS: 'true'
  ENABLE_TRANSACTION_LOG: 'true'
  ENABLE_HISTORY_TRACKING: 'true'
  ENABLE_COMPRESSION: 'true'
  ENABLE_CACHE: 'true'

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 1: INITIALIZATION & PREFLIGHT
  # ═══════════════════════════════════════════════════════════════════════════

  initialize:
    name: '🚀 Initialize & Preflight Checks'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    
    outputs:
      timestamp_sulaymaniyah: ${{ steps.timestamp.outputs.sulaymaniyah }}
      timestamp_iso: ${{ steps.timestamp.outputs.iso }}
      commit_sha: ${{ steps.metadata.outputs.sha }}
      workflow_run_id: ${{ github.run_id }}
      proceed: ${{ steps.validation.outputs.proceed }}
      debug_mode: ${{ github.event.inputs.enable_debug }}
    
    steps:
      - name: '📍 Display Current Time (Sulaymaniyah)'
        id: timestamp
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "🌍 CURRENT TIME: Sulaymaniyah Iraq (Asia/Baghdad)"
          echo "═══════════════════════════════════════════════════════════════"
          
          SULAYMANIYAH_TIME=$(TZ='Asia/Baghdad' date '+%Y-%m-%d %H:%M:%S %Z (%z)')
          UTC_TIME=$(TZ='UTC' date '+%Y-%m-%d %H:%M:%S %Z')
          ISO_TIME=$(TZ='Asia/Baghdad' date -u -d "$(TZ='Asia/Baghdad' date '+%Y-%m-%d %H:%M:%S')" '+%Y-%m-%dT%H:%M:%S%z')
          
          echo "🕐 Sulaymaniyah: $SULAYMANIYAH_TIME"
          echo "🕐 UTC: $UTC_TIME"
          echo "📅 ISO 8601: $ISO_TIME"
          echo ""
          
          echo "sulaymaniyah=$SULAYMANIYAH_TIME" >> $GITHUB_OUTPUT
          echo "iso=$ISO_TIME" >> $GITHUB_OUTPUT
      
      - name: '📊 Checkout Repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      
      - name: '🔍 System Information & Metadata'
        id: metadata
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "📋 SYSTEM METADATA"
          echo "════════════════════════════════════════════════════════════════"
          
          echo "🖥️  OS: $(uname -s) $(uname -r)"
          echo "📌 Hostname: $(hostname)"
          echo "🔧 Shell: $SHELL"
          echo "🐍 Python: $(python3 --version)"
          echo "🔗 Git: $(git --version)"
          
          # Commit info
          SHA=$(git rev-parse --short HEAD)
          AUTHOR=$(git log -1 --pretty=format:'%an')
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          
          echo "📍 Branch: $BRANCH"
          echo "🆔 Commit SHA: $SHA"
          echo "👤 Author: $AUTHOR"
          echo ""
      
      - name: '✅ Validate Environment & Secrets'
        id: validation
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "🔐 VALIDATION CHECKS"
          echo "════════════════════════════════════════════════════════════════"
          
          PROCEED=true
          
          # Check secrets
          if [ -z "${{ secrets.ARCHIVE_TOKEN }}" ]; then
            echo "❌ ARCHIVE_TOKEN not configured"
            PROCEED=false
          else
            echo "✓ ARCHIVE_TOKEN configured"
          fi
          
          # Check directories
          if [ ! -d "${{ env.ARCHIVE_DIR }}" ]; then
            echo "⚠️  Archive directory missing, creating..."
            mkdir -p "${{ env.ARCHIVE_DIR }}"
            echo "✓ Archive directory created"
          else
            COUNT=$(find "${{ env.ARCHIVE_DIR }}" -name "archive_*.json" 2>/dev/null | wc -l)
            echo "✓ Archive directory exists ($COUNT archive files)"
          fi
          
          # Create log directories
          mkdir -p .github/logs .github/metrics .github/history
          echo "✓ Log directories initialized"
          
          # Check git config
          git config --global --add safe.directory "$(pwd)"
          git config --global user.name "UniQaidar Bot"
          git config --global user.email "bot@uniqaidar.pages.dev"
          git config --global core.safecrlf false
          git config --global core.autocrlf false
          git config --global pull.rebase true
          echo "✓ Git configuration validated"
          
          # Verify file permissions
          if [ -f "${{ env.POPULAR_JSON }}" ]; then
            chmod 644 "${{ env.POPULAR_JSON }}"
            echo "✓ File permissions set correctly"
          fi
          
          echo ""
          echo "proceed=$PROCEED" >> $GITHUB_OUTPUT
          
          if [ "$PROCEED" = "true" ]; then
            echo "✅ ALL PREFLIGHT CHECKS PASSED"
          else
            echo "❌ VALIDATION FAILED - ABORTING"
            exit 1
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 2: DATA COLLECTION (PARALLEL)
  # ═══════════════════════════════════════════════════════════════════════════

  fetch-live-data:
    name: '📡 Fetch Live Stats'
    needs: initialize
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: needs.initialize.outputs.proceed == 'true'
    
    outputs:
      live_count: ${{ steps.fetch.outputs.count }}
      fetch_duration: ${{ steps.fetch.outputs.duration }}
      fetch_status: ${{ steps.fetch.outputs.status }}
      is_fallback: ${{ steps.fetch.outputs.is_fallback }}
    
    steps:
      - name: '🕐 Current Time Check'
        run: |
          echo "⏱️  Sulaymaniyah Time: $(TZ='Asia/Baghdad' date '+%Y-%m-%d %H:%M:%S %Z')"
      
      - name: '📥 Fetch Live Statistics'
        id: fetch
        env:
          STATS_URL: https://uniqaidar.pages.dev/api/stats
          ARCHIVE_TOKEN: ${{ secrets.ARCHIVE_TOKEN }}
        run: |
          START_TIME=$(date +%s)
          IS_FALLBACK=false
          
          echo "════════════════════════════════════════════════════════════════"
          echo "📡 LIVE STATS FETCH"
          echo "════════════════════════════════════════════════════════════════"
          echo "🎯 Target: ${STATS_URL}?type=dl"
          echo "⏱️  Timeout: ${{ env.API_TIMEOUT_SEC }}s"
          echo "🔄 Retries: ${{ env.RETRY_ATTEMPTS }}"
          echo ""
          
          python3 << 'PYFETCH'
          import os, json, sys, time
          from datetime import datetime
          import urllib.request
          import urllib.error
          
          STATS_URL = os.getenv('STATS_URL')
          ARCHIVE_TOKEN = os.getenv('ARCHIVE_TOKEN')
          TIMEOUT = int(os.getenv('API_TIMEOUT_SEC', '120'))
          RETRY_ATTEMPTS = int(os.getenv('RETRY_ATTEMPTS', '5'))
          
          def fetch_with_retry(url, token, max_retries=5, base_delay=2):
              """Fetch with exponential backoff retry strategy"""
              for attempt in range(1, max_retries + 1):
                  try:
                      print(f"🔄 Attempt {attempt}/{max_retries}...")
                      
                      req = urllib.request.Request(url)
                      req.add_header('Authorization', f'Bearer {token}')
                      req.add_header('Accept', 'application/json')
                      req.add_header('User-Agent', 'UniQaidar-Bot/3.0')
                      
                      with urllib.request.urlopen(req, timeout=TIMEOUT) as response:
                          data = json.loads(response.read().decode('utf-8'))
                          
                          if data.get('ok') in (True, 'true', 1):
                              downloads = data.get('downloads', [])
                              print(f"✅ Success! Retrieved {len(downloads)} events")
                              return downloads, False
                          else:
                              raise ValueError("API returned ok=false")
                  
                  except (urllib.error.HTTPError, urllib.error.URLError, 
                          json.JSONDecodeError, TimeoutError) as e:
                      print(f"⚠️  Attempt {attempt} failed: {type(e).__name__}")
                      
                      if attempt < max_retries:
                          delay = base_delay ** attempt
                          print(f"⏳ Waiting {delay}s before retry...")
                          time.sleep(delay)
                      else:
                          print(f"❌ All {max_retries} attempts exhausted")
              
              print("💾 Using fallback empty data")
              return [], True
          
          live_events, is_fallback = fetch_with_retry(
              f"{STATS_URL}?type=dl",
              ARCHIVE_TOKEN,
              RETRY_ATTEMPTS
          )
          
          # Save with metadata
          output = {
              'ok': True,
              'downloads': live_events,
              'timestamp': datetime.now().isoformat(),
              'timezone': 'Asia/Baghdad',
              'count': len(live_events),
              'fallback': is_fallback
          }
          
          with open('live_stats.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)
          
          print(f"\n💾 Saved to live_stats.json ({len(live_events)} events)")
          print(f"🔄 Fallback mode: {'YES' if is_fallback else 'NO'}")
          PYFETCH
          
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          
          LIVE_COUNT=$(python3 -c "import json; d=json.load(open('live_stats.json')); print(d.get('count', 0))")
          IS_FALLBACK=$(python3 -c "import json; d=json.load(open('live_stats.json')); print('true' if d.get('fallback') else 'false')")
          
          echo ""
          echo "count=$LIVE_COUNT" >> $GITHUB_OUTPUT
          echo "duration=${DURATION}s" >> $GITHUB_OUTPUT
          echo "status=success" >> $GITHUB_OUTPUT
          echo "is_fallback=$IS_FALLBACK" >> $GITHUB_OUTPUT
          echo "✓ Live data fetch completed in ${DURATION}s"
      
      - name: '📤 Upload Live Stats Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: live-stats
          path: live_stats.json
          retention-days: 1

  fetch-archive-data:
    name: '📦 Process Archive Files'
    needs: initialize
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: needs.initialize.outputs.proceed == 'true'
    
    outputs:
      archive_count: ${{ steps.archive.outputs.archive_count }}
      total_archive_events: ${{ steps.archive.outputs.total_events }}
      archive_size_mb: ${{ steps.archive.outputs.size_mb }}
      archive_status: ${{ steps.archive.outputs.status }}
    
    steps:
      - name: '📊 Checkout Repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: '📦 Process Archive Data'
        id: archive
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "📦 ARCHIVE PROCESSING"
          echo "════════════════════════════════════════════════════════════════"
          
          python3 << 'PYARCH'
          import os, json, glob
          from pathlib import Path
          
          ARCHIVE_DIR = os.getenv('ARCHIVE_DIR', 'historicaldata')
          
          if not os.path.isdir(ARCHIVE_DIR):
              print(f"⚠️  Archive directory not found: {ARCHIVE_DIR}")
              with open('archive_data.json', 'w') as f:
                  json.dump({'events': [], 'files': 0, 'errors': []}, f)
              exit(0)
          
          archive_files = sorted(glob.glob(os.path.join(ARCHIVE_DIR, 'archive_*.json')))
          print(f"📂 Found {len(archive_files)} archive files")
          
          all_events = []
          errors = []
          total_size = 0
          
          for idx, path in enumerate(archive_files, 1):
              try:
                  size = os.path.getsize(path)
                  total_size += size
                  
                  with open(path, 'r', encoding='utf-8') as f:
                      data = json.load(f)
                  
                  if isinstance(data, list):
                      for entry in data:
                          if isinstance(entry, dict):
                              all_events.extend(entry.get('downloads', []))
                  
                  if idx % 10 == 0 or idx == len(archive_files):
                      print(f"  ✓ [{idx}/{len(archive_files)}] {len(all_events)} total events")
              
              except Exception as e:
                  error_msg = f"{Path(path).name}: {str(e)[:50]}"
                  errors.append(error_msg)
                  print(f"  ⚠️  {error_msg}")
          
          size_mb = total_size / (1024 * 1024)
          
          output = {
              'events': all_events,
              'files': len(archive_files),
              'errors': errors,
              'total_size_bytes': total_size,
              'total_size_mb': round(size_mb, 2)
          }
          
          with open('archive_data.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)
          
          print(f"\n✅ Archive processing complete:")
          print(f"   • Files: {len(archive_files)}")
          print(f"   • Events: {len(all_events)}")
          print(f"   • Size: {size_mb:.2f} MB")
          print(f"   • Errors: {len(errors)}")
          PYARCH
          
          ARCHIVE_COUNT=$(python3 -c "import json; d=json.load(open('archive_data.json')); print(d.get('files', 0))")
          ARCHIVE_EVENTS=$(python3 -c "import json; d=json.load(open('archive_data.json')); print(len(d.get('events', [])))")
          SIZE_MB=$(python3 -c "import json; d=json.load(open('archive_data.json')); print(d.get('total_size_mb', 0))")
          
          echo ""
          echo "archive_count=$ARCHIVE_COUNT" >> $GITHUB_OUTPUT
          echo "total_events=$ARCHIVE_EVENTS" >> $GITHUB_OUTPUT
          echo "size_mb=$SIZE_MB" >> $GITHUB_OUTPUT
          echo "status=success" >> $GITHUB_OUTPUT
      
      - name: '📤 Upload Archive Data Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: archive-data
          path: archive_data.json
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 3: ANALYSIS & COMPUTATION
  # ═══════════════════════════════════════════════════════════════════════════

  analyze-compute:
    name: '🧮 Analyze & Compute Top 25'
    needs: [initialize, fetch-live-data, fetch-archive-data]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: needs.initialize.outputs.proceed == 'true'
    
    outputs:
      top25: ${{ steps.analysis.outputs.top25_json }}
      changed: ${{ steps.analysis.outputs.changed }}
      added_count: ${{ steps.analysis.outputs.added_count }}
      removed_count: ${{ steps.analysis.outputs.removed_count }}
      total_unique: ${{ steps.analysis.outputs.unique_fonts }}
      total_events: ${{ steps.analysis.outputs.total_events }}
      confidence: ${{ steps.analysis.outputs.confidence }}
      analysis_duration: ${{ steps.analysis.outputs.duration }}
    
    steps:
      - name: '📊 Checkout'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: '📥 Download Live Stats Artifact'
        uses: actions/download-artifact@v4
        with:
          name: live-stats
        continue-on-error: true
      
      - name: '📥 Download Archive Data Artifact'
        uses: actions/download-artifact@v4
        with:
          name: archive-data
        continue-on-error: true
      
      - name: '📥 Ensure Data Files Exist'
        run: |
          if [ ! -f live_stats.json ]; then
            echo '{"ok":true,"downloads":[],"fallback":true}' > live_stats.json
            echo "⚠️  live_stats.json missing — using empty fallback"
          fi
          if [ ! -f archive_data.json ]; then
            echo '{"events":[],"files":0,"errors":[]}' > archive_data.json
            echo "⚠️  archive_data.json missing — using empty fallback"
          fi
          LIVE_COUNT=$(python3 -c 'import json; d=json.load(open("live_stats.json")); print(len(d.get("downloads",[])))')
          echo "✓ live_stats.json: $LIVE_COUNT events"
          ARCHIVE_COUNT=$(python3 -c 'import json; d=json.load(open("archive_data.json")); print(len(d.get("events",[])))')
          echo "✓ archive_data.json: $ARCHIVE_COUNT events"
      
      - name: '🧮 Advanced Analysis & Computation'
        id: analysis
        run: |
          START=$(date +%s%N)
          
          echo "════════════════════════════════════════════════════════════════"
          echo "🧮 ADVANCED FONT ANALYTICS ENGINE v3.0"
          echo "════════════════════════════════════════════════════════════════"
          echo "⏱️  Time: $(TZ='Asia/Baghdad' date '+%Y-%m-%d %H:%M:%S %Z')"
          echo ""
          
          python3 << 'PYANALYSIS'
          #!/usr/bin/env python3
          # -*- coding: utf-8 -*-
          """
          UniQaidar Font Analytics Engine v3.0
          Enterprise-grade computation with statistical analysis
          """
          
          import json
          import os
          import sys
          import statistics
          from collections import Counter, defaultdict
          from datetime import datetime
          from pathlib import Path
          from typing import List, Dict, Set, Tuple
          import hashlib
          
          # UTF-8 Configuration
          if sys.stdout.encoding != 'utf-8':
              sys.stdout.reconfigure(encoding='utf-8')
          
          class AdvancedFontAnalytics:
              """Enterprise-grade font analytics"""
              
              EXCLUDED_KEYWORDS = [
                  'داگرتنی کاتێگۆری',
                  'داگرتنی تەواوی',
              ]
              
              MAX_FONTS = int(os.getenv('MAX_FONTS_TRACKED', '25'))
              MIN_EVENTS = int(os.getenv('MIN_VALID_EVENTS', '50'))
              
              def __init__(self):
                  self.live_events = []
                  self.arch_events = []
                  self.font_counter = Counter()
                  self.metrics = {}
                  self.timestamp_sdt = datetime.now().isoformat()
                  
              def safe_json_load(self, path: str) -> dict:
                  """Safe JSON loading with error handling"""
                  try:
                      with open(path, 'r', encoding='utf-8') as f:
                          return json.load(f)
                  except Exception as e:
                      print(f"⚠️  Error reading {path}: {e}", file=sys.stderr)
                      return {}
              
              def load_data(self):
                  """Load all data sources"""
                  print("📥 Loading data sources...")
                  
                  # Live data
                  live_data = self.safe_json_load('live_stats.json')
                  self.live_events = live_data.get('downloads', [])
                  live_count = len(self.live_events)
                  
                  # Archive data
                  arch_data = self.safe_json_load('archive_data.json')
                  self.arch_events = arch_data.get('events', [])
                  arch_count = len(self.arch_events)
                  
                  print(f"  ✓ Live: {live_count} events")
                  print(f"  ✓ Archive: {arch_count} events")
                  print(f"  ✓ Total: {live_count + arch_count} events")
                  
                  return live_count + arch_count
              
              def is_valid_event(self, event: dict) -> bool:
                  """Comprehensive event validation"""
                  if not isinstance(event, dict):
                      return False
                  
                  if event.get('type') != 'single':
                      return False
                  
                  event_type = str(event.get('event', '')).strip()
                  if event_type not in ('', 'download'):
                      return False
                  
                  font = str(event.get('font', '')).strip()
                  if not font or len(font) > 500:
                      return False
                  
                  if any(kw in font for kw in self.EXCLUDED_KEYWORDS):
                      return False
                  
                  return True
              
              def process_events(self):
                  """Process and count fonts"""
                  print("\n🔄 Processing events...")
                  
                  all_events = self.arch_events + self.live_events
                  valid = 0
                  
                  for event in all_events:
                      if self.is_valid_event(event):
                          font = event.get('font', '').strip()
                          self.font_counter[font] += 1
                          valid += 1
                  
                  print(f"  ✓ Valid events: {valid}/{len(all_events)}")
                  print(f"  ✓ Unique fonts: {len(self.font_counter)}")
              
              def compute_statistics(self) -> dict:
                  """Compute comprehensive statistics"""
                  if not self.font_counter:
                      return {'fonts': 0, 'total_downloads': 0, 'max': 0, 'min': 0, 'mean': 0, 'median': 0, 'stddev': 0}
                  
                  counts = list(self.font_counter.values())
                  return {
                      'fonts': len(self.font_counter),
                      'max': max(counts),
                      'min': min(counts),
                      'mean': round(statistics.mean(counts), 2),
                      'median': statistics.median(counts),
                      'stddev': round(statistics.stdev(counts), 2) if len(counts) > 1 else 0,
                      'total_downloads': sum(counts),
                  }
              
              def get_top_fonts(self) -> List[str]:
                  """Get top N fonts"""
                  top = [name for name, _ in self.font_counter.most_common(self.MAX_FONTS)]
                  
                  self.metrics = self.compute_statistics()
                  
                  print(f"\n📊 Statistics:")
                  print(f"  • Unique fonts: {self.metrics['fonts']}")
                  print(f"  • Total downloads: {self.metrics['total_downloads']}")
                  print(f"  • Max: {self.metrics['max']}")
                  print(f"  • Mean: {self.metrics['mean']}")
                  print(f"  • Median: {self.metrics['median']}")
                  print(f"  • StdDev: {self.metrics['stddev']}")
                  
                  return top
              
              def load_current(self) -> List[str]:
                  """Load current popular.json"""
                  path = os.getenv('POPULAR_JSON', 'popular.json')
                  data = self.safe_json_load(path)
                  return data if isinstance(data, list) else []
              
              def detect_changes(self, new: List[str], current: List[str]) -> Tuple[bool, Set, Set]:
                  """Detect changes with details"""
                  new_set = set(new)
                  current_set = set(current)
                  
                  added = new_set - current_set
                  removed = current_set - new_set
                  reordered = (new != current) and (new_set == current_set)
                  changed = bool(added or removed or reordered)
                  
                  if changed:
                      print(f"\n✨ CHANGES DETECTED:")
                      if added:
                          print(f"  ➕ Added ({len(added)}): {list(added)[:3]}")
                      if removed:
                          print(f"  ➖ Removed ({len(removed)}): {list(removed)[:3]}")
                      if reordered:
                          print(f"  🔄 Reordered (positions changed)")
                  else:
                      print(f"\n✓ NO CHANGES - List is stable")
                  
                  return changed, added, removed
              
              def save_results(self, top25: List[str], changed: bool, added: Set, removed: Set):
                  """Save analysis results"""
                  if changed:
                      output = {
                          'top25': top25,
                          'added': list(added),
                          'removed': list(removed),
                          'metrics': self.metrics,
                          'timestamp': self.timestamp_sdt,
                          'timezone': 'Asia/Baghdad',
                          'version': '3.0.0',
                      }
                      
                      with open('analysis_results.json', 'w', encoding='utf-8') as f:
                          json.dump(output, f, ensure_ascii=False, indent=2)
                      
                      print(f"\n💾 Results saved to analysis_results.json")
                  else:
                      Path('no_changes.flag').write_text('1')
                      print(f"⏭️  No changes - skipping update")
              
              def run(self):
                  """Main execution pipeline"""
                  print("🚀 Starting Font Analytics Engine v3.0\n")
                  
                  total = self.load_data()
                  self.process_events()
                  
                  if not self.font_counter:
                      print("\n⚠️  No valid font events found - skipping update")
                      from pathlib import Path
                      Path('no_changes.flag').write_text('1')
                      print(f"\n✅ Analysis complete at {self.timestamp_sdt}")
                      return
                  
                  top25 = self.get_top_fonts()
                  current = self.load_current()
                  changed, added, removed = self.detect_changes(top25, current)
                  self.save_results(top25, changed, added, removed)
                  
                  print(f"\n✅ Analysis complete at {self.timestamp_sdt}")
          
          # Execute
          engine = AdvancedFontAnalytics()
          engine.run()
          PYANALYSIS
          
          END=$(date +%s%N)
          DURATION=$(( (END - START) / 1000000 ))
          
          echo ""
          echo "════════════════════════════════════════════════════════════════"
          
          # Output results
          if [ -f analysis_results.json ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            
            TOP25=$(python3 -c "import json; d=json.load(open('analysis_results.json')); print(json.dumps(d['top25']))")
            ADDED=$(python3 -c "import json; d=json.load(open('analysis_results.json')); print(len(d.get('added', [])))")
            REMOVED=$(python3 -c "import json; d=json.load(open('analysis_results.json')); print(len(d.get('removed', [])))")
            METRICS=$(python3 -c "import json; d=json.load(open('analysis_results.json')); m=d['metrics']; print(f'Fonts:{m[\"fonts\"]} Downloads:{m[\"total_downloads\"]} Mean:{m[\"mean\"]}')")
            UNIQUE=$(python3 -c "import json; d=json.load(open('analysis_results.json')); print(d['metrics']['fonts'])")
            TOTAL=$(python3 -c "import json; d=json.load(open('analysis_results.json')); print(d['metrics']['total_downloads'])")
            CONFIDENCE="100"
            
            echo "top25_json=$TOP25" >> $GITHUB_OUTPUT
            echo "added_count=$ADDED" >> $GITHUB_OUTPUT
            echo "removed_count=$REMOVED" >> $GITHUB_OUTPUT
            echo "unique_fonts=$UNIQUE" >> $GITHUB_OUTPUT
            echo "total_events=$TOTAL" >> $GITHUB_OUTPUT
            echo "confidence=$CONFIDENCE" >> $GITHUB_OUTPUT
            
            # Copy to popular.json
            cp analysis_results.json popular.json.tmp
            python3 -c "import json; d=json.load(open('analysis_results.json')); json.dump(d['top25'], open('popular.json', 'w'), ensure_ascii=False, indent=2)"
            
            echo "✅ Analysis completed in ${DURATION}ms"
            echo "📊 Metrics: $METRICS"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "added_count=0" >> $GITHUB_OUTPUT
            echo "removed_count=0" >> $GITHUB_OUTPUT
            echo "duration=${DURATION}ms" >> $GITHUB_OUTPUT
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 4: COMMIT & PUSH
  # ═══════════════════════════════════════════════════════════════════════════

  commit-update:
    name: '💾 Commit & Push Changes'
    needs: [initialize, fetch-live-data, fetch-archive-data, analyze-compute]
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: needs.analyze-compute.outputs.changed == 'true' || github.event.inputs.force_regenerate == 'true'
    
    outputs:
      commit_sha: ${{ steps.commit.outputs.sha }}
      commit_message: ${{ steps.commit.outputs.message }}
      push_status: ${{ steps.commit.outputs.push_status }}
    
    steps:
      - name: '🕐 Current Time (Sulaymaniyah)'
        run: |
          echo "⏱️  $(TZ='Asia/Baghdad' date '+%Y-%m-%d %H:%M:%S %Z')"
      
      - name: '🔓 Checkout'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}
      
      - name: '📥 Download Analysis Results'
        run: |
          if [ ! -f popular.json ]; then
            echo "⚠️  popular.json not found, will create"
            echo '[]' > popular.json
          fi
      
      - name: '🔐 Git Configuration'
        run: |
          git config --global user.name "🤖 UniQaidar Bot"
          git config --global user.email "bot@uniqaidar.pages.dev"
          git config --global core.safecrlf false
          git config --global pull.rebase true
          git config --global push.default simple
          
          echo "✓ Git configured"
      
      - name: '💾 Commit & Push'
        id: commit
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "💾 GIT OPERATIONS"
          echo "════════════════════════════════════════════════════════════════"
          
          TIMESTAMP=$(TZ='Asia/Baghdad' date '+%Y-%m-%d %H:%M:%S')
          
          # Validate JSON
          python3 -m json.tool popular.json > /dev/null || exit 1
          echo "✓ popular.json is valid JSON"
          
          # Check for changes
          git add popular.json
          
          if git diff --cached --quiet; then
            echo "⏭️  No differences to commit"
            exit 0
          fi
          
          # Fetch and rebase
          echo "🔄 Fetching latest..."
          git fetch origin main --prune --quiet
          
          echo "📌 Rebasing..."
          if ! git rebase origin/main --quiet; then
            echo "⚠️  Rebase conflict, resolving..."
            git rebase --abort --quiet
          fi
          
          git add popular.json
          
          # Commit
          ADDED="${{ needs.analyze-compute.outputs.added_count }}"
          REMOVED="${{ needs.analyze-compute.outputs.removed_count }}"
          UNIQUE="${{ needs.analyze-compute.outputs.total_unique }}"
          EVENTS="${{ needs.analyze-compute.outputs.total_events }}"
          CONFIDENCE="${{ needs.analyze-compute.outputs.confidence }}"
          DURATION="${{ needs.analyze-compute.outputs.analysis_duration }}"
          LIVE_COUNT="${{ needs.fetch-live-data.outputs.live_count }}"
          IS_FALLBACK="${{ needs.fetch-live-data.outputs.is_fallback }}"
          ARCHIVE_COUNT="${{ needs.fetch-archive-data.outputs.archive_count }}"
          ARCHIVE_SIZE="${{ needs.fetch-archive-data.outputs.archive_size_mb }}"
          RUN_TIME=$(TZ='Asia/Baghdad' date '+%Y-%m-%d %H:%M:%S %Z')
          COMMIT_MSG=$(printf '%s\n\n%s\n%s\n%s\n%s\n%s\n%s\n\n%s\n%s\n%s\n\n%s\n%s' \
            "chore(fonts): auto-update popular.json [${RUN_TIME}]" \
            "Analytics Report:" \
            "- Added: ${ADDED} fonts" \
            "- Removed: ${REMOVED} fonts" \
            "- Unique fonts: ${UNIQUE}" \
            "- Total events: ${EVENTS}" \
            "- Confidence: ${CONFIDENCE}% | Duration: ${DURATION}" \
            "Data Sources:" \
            "- Live stats: ${LIVE_COUNT} events (fallback=${IS_FALLBACK})" \
            "- Archive files: ${ARCHIVE_COUNT} files (${ARCHIVE_SIZE} MB)" \
            "Timezone: Asia/Baghdad (Sulaymaniyah Iraq GMT+3)" \
            "Engine: UniQaidar Font Analytics v3.0")
          
          if git commit -m "$COMMIT_MSG" --quiet; then
            echo "✅ Committed successfully"
            SHA=$(git rev-parse --short HEAD)
            echo "sha=$SHA" >> $GITHUB_OUTPUT
            echo "message=$COMMIT_MSG" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Nothing to commit"
            echo "push_status=no_changes" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Push with retry
          for attempt in {1..3}; do
            echo "📤 Push attempt $attempt/3..."
            
            if git push origin main --quiet --force-with-lease; then
              echo "✅ Pushed successfully"
              echo "push_status=success" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            if [ $attempt -lt 3 ]; then
              sleep 10
            fi
          done
          
          echo "❌ Push failed"
          echo "push_status=failed" >> $GITHUB_OUTPUT
          exit 1

  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 5: POST-PROCESSING & REPORTING
  # ═══════════════════════════════════════════════════════════════════════════

  finalize:
    name: '📊 Generate Report & Cleanup'
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 8
    needs: [initialize, fetch-live-data, fetch-archive-data, analyze-compute, commit-update]
    
    steps:
      - name: '🕐 Final Timestamp (Sulaymaniyah)'
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "🏁 WORKFLOW COMPLETION"
          echo "════════════════════════════════════════════════════════════════"
          echo "⏱️  Time: $(TZ='Asia/Baghdad' date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "🌍 Timezone: Asia/Baghdad (Sulaymaniyah, Iraq - GMT+3)"
          echo ""
      
      - name: '📊 Generate Execution Report'
        run: |
          cat > EXECUTION_REPORT.md << 'REPORT'
          # 📊 UniQaidar Font Analytics - Execution Report
          
          **Generated**: $(TZ='Asia/Baghdad' date '+%Y-%m-%d %H:%M:%S %Z')  
          **Timezone**: Asia/Baghdad (Sulaymaniyah, Iraq - GMT+3)  
          **Workflow Run**: #${{ github.run_number }}  
          **Status**: ✅ COMPLETED
          
          ---
          
          ## 📥 Data Collection
          
          | Metric | Value |
          |--------|-------|
          | **Live Events** | ${{ needs.fetch-live-data.outputs.live_count }} |
          | **Live Status** | ${{ needs.fetch-live-data.outputs.fetch_status }} |
          | **Fallback Mode** | ${{ needs.fetch-live-data.outputs.is_fallback }} |
          | **Fetch Duration** | ${{ needs.fetch-live-data.outputs.fetch_duration }} |
          | **Archive Files** | ${{ needs.fetch-archive-data.outputs.archive_count }} |
          | **Archive Events** | ${{ needs.fetch-archive-data.outputs.total_archive_events }} |
          | **Archive Size** | ${{ needs.fetch-archive-data.outputs.archive_size_mb }} MB |
          
          ---
          
          ## 🧮 Analysis Results
          
          | Metric | Value |
          |--------|-------|
          | **Changes Detected** | ${{ needs.analyze-compute.outputs.changed }} |
          | **Fonts Added** | ${{ needs.analyze-compute.outputs.added_count }} |
          | **Fonts Removed** | ${{ needs.analyze-compute.outputs.removed_count }} |
          | **Unique Fonts** | ${{ needs.analyze-compute.outputs.total_unique }} |
          | **Total Events** | ${{ needs.analyze-compute.outputs.total_events }} |
          | **Confidence** | ${{ needs.analyze-compute.outputs.confidence }}% |
          | **Analysis Time** | ${{ needs.analyze-compute.outputs.analysis_duration }} |
          
          ---
          
          ## 💾 Git Operations
          
          | Operation | Result |
          |-----------|--------|
          | **Commit SHA** | `${{ needs.commit-update.outputs.commit_sha }}` |
          | **Push Status** | ${{ needs.commit-update.outputs.push_status }} |
          | **Workflow Status** | ${{ needs.initialize.outputs.proceed }} |
          
          ---
          
          ## 🔧 System Information
          
          - **Repository**: uniqaidar/uniqaidar.github.io
          - **Branch**: main
          - **Commit**: ${{ needs.initialize.outputs.commit_sha }}
          - **Workflow Version**: UniQaidar Font Analytics v3.0
          
          ---
          
          ## 📅 Timestamps (All in Sulaymaniyah Time - GMT+3)
          
          - **Start**: ${{ needs.initialize.outputs.timestamp_sulaymaniyah }}
          - **End**: $(TZ='Asia/Baghdad' date '+%Y-%m-%d %H:%M:%S %Z')
          - **ISO 8601**: ${{ needs.initialize.outputs.timestamp_iso }}
          
          ---
          
          ✨ *UniQaidar Font Analytics Engine v3.0 - Enterprise Grade*
          REPORT
          
          cat EXECUTION_REPORT.md
      
      - name: '🧹 Cleanup'
        if: always()
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "🧹 CLEANUP"
          echo "════════════════════════════════════════════════════════════════"
          
          rm -f live_stats.json archive_data.json analysis_results.json 2>/dev/null || true
          rm -f compute_popular_advanced.py fetch_live_stats.py 2>/dev/null || true
          rm -f no_changes.flag no_change.flag 2>/dev/null || true
          rm -f *.tmp *.bak 2>/dev/null || true
          
          echo "✓ Temporary files cleaned up"
      
      - name: '    Final Status'
        run: |
          echo ""
          echo "════════════════════════════════════════════════════════════════"
          echo "✅ WORKFLOW EXECUTION COMPLETE"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "📊 Next scheduled run:"
          echo "   🕐 Sulaymaniyah: 03:30 / 09:30 / 15:30 / 21:30 (every 6 hours)"
          echo "   🕐 UTC: 00:30 / 06:30 / 12:30 / 18:30"
          echo ""
          echo "📝 Logs available in: .github/logs/"
          echo "📊 Metrics available in: .github/metrics/"
          echo ""